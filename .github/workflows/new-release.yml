name: New release

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Release name (e.g. stable2509-7)'
        required: true
        type: string
      date:
        description: 'Release date (YYYY-MM-DD)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  new-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system dependencies for Pillow
        run: sudo apt-get update && sudo apt-get install -y libjpeg-dev zlib1g-dev

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
        with:
          just-version: 1.35.0

      - name: Create release branch
        env:
          RELEASE: ${{ inputs.release }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout -b "release-${RELEASE}"

      - name: Publish release and regenerate files
        env:
          RELEASE: ${{ inputs.release }}
          RELEASE_DATE: ${{ inputs.date }}
        run: |
          just venv
          just publish "${RELEASE}" "${RELEASE_DATE}"
          just

      - name: Commit and push
        env:
          RELEASE: ${{ inputs.release }}
        run: |
          git add .
          git commit -m "Release ${RELEASE}"
          git push --set-upstream origin "release-${RELEASE}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE: ${{ inputs.release }}
        run: |
          gh pr create \
            --base main \
            --head "release-${RELEASE}" \
            --title "Release ${RELEASE}" \
            --body ""
