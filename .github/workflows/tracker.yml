name: PR Tracker
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/checkout@v4
        with:
          repository: paritytech/polkadot-sdk
          path: polkadot-sdk
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tracker
      - run: cargo build --release --manifest-path tracker/Cargo.toml
      - run: ./tracker/target/release/tracker --sdk-repo polkadot-sdk
        env:
          GITHUB_TOKEN: ${{ secrets.TRACKER_PAT }}
      - name: Commit and push state
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tracker/state.json
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "chore: update tracker state"
            git push origin main
          fi
